<!DOCTYPE html>

<head>

<body>

    <!-- INTRO OVERLAY -->

            <div class="gate-label">Era Voyage</div>

            <button class="gate-btn" onclick="startVoyage()">Enter</button>
        </div>
        <div class="flash-bg era-egypt"  id="bg-egypt"></div>
        <div class="flash-bg era-greece" id="bg-greece"></div>
        <div class="flash-bg era-native" id="bg-native"></div>

        <div class="era-flash-label" id="era-label"></div>
        <div class="flash-year" id="flash-count"></div>

        <div class="intro-final-logo" id="i-final-logo">

            <div class="era-stripe" id="eraStripe">
                <span></span><span></span><span></span><span></span>
            </div>

        </div>
    </div>

    <div id="main-ui">
        <div id="bg-overlay"></div>
        <div id="canvas-container"></div>

        <div class="content" id="content-box">
            <div class="era-label" id="label">THE DAWN OF CIVILIZATION</div>
            <h1 class="era-title" id="title">WHISPERS<br>OF THE SANDS</h1>
            <p class="description" id="desc">...</p>
            <a href="Pharaohs-Page/pharaohs.html" id="era-link" class="era-btn" onclick="playClick()">Uncover the Secrets</a>
        </div>

        <div class="nav-controls">
            <div class="nav-arrow" onclick="playClick(); updateEra(-1)"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
            <div class="nav-arrow" onclick="playClick(); updateEra(1)"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
        </div>

        <div class="pagination">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script src="Main Start Page/StartPage.js"></script>
